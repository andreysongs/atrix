<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title description">
  <title id="title">Pulse</title>
  <desc id="description">Ícone adaptável do Pulse com símbolo de atividade física.</desc>
  <defs>
    <radialGradient id="background" cx="0" cy="0" r="1" gradientTransform="translate(176 104) rotate(51) scale(534)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#19233a"/>
      <stop offset="0.48" stop-color="#0b101b"/>
      <stop offset="1" stop-color="#06080d"/>
    </radialGradient>
    <linearGradient id="ring" x1="117" y1="112" x2="409" y2="404" gradientUnits="userSpaceOnUse">
      <stop stop-color="#5b7cfa"/>
      <stop offset="0.53" stop-color="#9d72ff"/>
      <stop offset="1" stop-color="#43d9ff"/>
    </linearGradient>
    <linearGradient id="pulse" x1="137" y1="196" x2="377" y2="327" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7191ff"/>
      <stop offset="0.5" stop-color="#a77cff"/>
      <stop offset="1" stop-color="#43d9ff"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feComposite in="blur" in2="SourceGraphic" operator="out" result="halo"/>
      <feColorMatrix in="halo" values="0 0 0 0 0.263 0 0 0 0 0.851 0 0 0 0 1 0 0 0 .4 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#background)"/>
  <circle cx="256" cy="256" r="174" fill="#0d131d" fill-opacity=".86" stroke="#fff" stroke-opacity=".06" stroke-width="2"/>
  <circle cx="256" cy="256" r="145" fill="none" stroke="url(#ring)" stroke-width="13" stroke-linecap="round" stroke-dasharray="650 265" transform="rotate(-42 256 256)" opacity=".94"/>
  <path d="M137 274h60l30-79 51 150 34-91h63" fill="none" stroke="url(#pulse)" stroke-width="25" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>
  <circle cx="375" cy="274" r="12.5" fill="#43d9ff"/>
  <circle cx="375" cy="274" r="22" fill="#43d9ff" opacity=".13"/>
</svg>

